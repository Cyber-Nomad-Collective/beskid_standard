# Corelib standalone repo: quality + test via rolling CLI (publish runs from beskid superrepo Dagger).
name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Beskid CLI (rolling)
        run: curl -fsSL https://beskid-lang.org/install.sh | bash

      - name: Corelib quality (manifest layout)
        run: |
          set -euo pipefail
          test -d beskid_corelib
          test -f CoreLib.bws
          grep -q 'name = "corelib"' beskid_corelib/*.bproj
          grep -q 'type = "Aggregate"' beskid_corelib/*.bproj
          test -f packages/foundation/src/Core/Results/Results.bd

      - name: Run corelib_tests (beskid test)
        run: |
          set -euo pipefail
          export PATH="${HOME}/.beskid/bin:${PATH}"
          manifest="$(ls beskid_corelib/tests/corelib_tests/*.bproj)"
          cd beskid_corelib/tests/corelib_tests
          beskid test --project "$(basename "$manifest")" --all-targets --plain

  publish:
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Corelib publish runs from the beskid superrepo (Dagger package-publish.publish-corelib)." >&2
          exit 1
